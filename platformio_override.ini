[env:magwled_1_esp32c3]
extends = env:esp32c3dev
build_flags = ${env:esp32c3dev.build_flags}
 -D BTNPIN=9
 -D RLYPIN=5
 -D I2S_SDPIN=10
 -D I2S_WSPIN=8
 -D I2S_CKPIN=7
 -D MCLK_PIN=-1
 -D SERVERNAME="\"MagWLED\""
 -D WLED_DISABLE_ALEXA
 -D ESPHTTPD_SINGLE_REQUEST

lib_deps = ${env:esp32c3dev.lib_deps}